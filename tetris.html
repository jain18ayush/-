<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: Arial, sans-serif;
            color: #fff;
        }

        .container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(10, 30px);
            grid-template-rows: repeat(20, 30px);
            gap: 1px;
            background: #111;
            padding: 10px;
            border: 2px solid #444;
        }

        .cell {
            background: #222;
            border: 1px solid #333;
        }

        .cell.filled {
            background: #0f0;
        }

        .cell.I { background: #0ff; }
        .cell.O { background: #ff0; }
        .cell.T { background: #f0f; }
        .cell.S { background: #0f0; }
        .cell.Z { background: #f00; }
        .cell.J { background: #00f; }
        .cell.L { background: #ff8800; }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info {
            background: #222;
            padding: 15px;
            border: 2px solid #444;
            border-radius: 5px;
            min-width: 150px;
        }

        .info h3 {
            margin-bottom: 10px;
            font-size: 14px;
            text-transform: uppercase;
        }

        .info p {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
        }

        .controls {
            background: #222;
            padding: 15px;
            border: 2px solid #444;
            border-radius: 5px;
            font-size: 12px;
            line-height: 1.8;
        }

        .controls p {
            margin: 5px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #0f0;
            color: #000;
            border: none;
            border-radius: 3px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background: #0d0;
        }

        button:active {
            transform: scale(0.98);
        }

        .game-over {
            text-align: center;
            color: #f00;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="gameBoard" class="game-board"></div>
        <div class="sidebar">
            <div class="info">
                <h3>Score</h3>
                <p id="score">0</p>
            </div>
            <div class="info">
                <h3>Level</h3>
                <p id="level">1</p>
            </div>
            <div class="info">
                <h3>Lines</h3>
                <p id="lines">0</p>
            </div>
            <div class="controls">
                <p><strong>Controls:</strong></p>
                <p>← → : Move</p>
                <p>↑ : Rotate</p>
                <p>↓ : Drop</p>
                <p>Space : Fast Drop</p>
                <p id="gameOverMsg"></p>
                <button id="resetBtn">New Game</button>
            </div>
        </div>
    </div>

    <script>
        const COLS = 10, ROWS = 20;
        const BLOCK_SIZE = 30;
        const TYPES = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];

        const SHAPES = {
            I: [[1, 1, 1, 1]],
            O: [[1, 1], [1, 1]],
            T: [[0, 1, 0], [1, 1, 1]],
            S: [[0, 1, 1], [1, 1, 0]],
            Z: [[1, 1, 0], [0, 1, 1]],
            J: [[1, 0, 0], [1, 1, 1]],
            L: [[0, 0, 1], [1, 1, 1]]
        };

        let board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
        let currentPiece = null;
        let nextPiece = null;
        let score = 0;
        let lines = 0;
        let gameOver = false;
        let dropCounter = 0;
        let dropInterval = 500;
        let lastTime = 0;

        const gameBoard = document.getElementById('gameBoard');
        const scoreDisplay = document.getElementById('score');
        const levelDisplay = document.getElementById('level');
        const linesDisplay = document.getElementById('lines');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const resetBtn = document.getElementById('resetBtn');

        function createPiece() {
            const type = TYPES[Math.floor(Math.random() * TYPES.length)];
            return {
                type,
                shape: JSON.parse(JSON.stringify(SHAPES[type])),
                x: Math.floor(COLS / 2) - 1,
                y: 0
            };
        }

        function isValid(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (!piece.shape[y][x]) continue;
                    const newX = piece.x + x;
                    const newY = piece.y + y;
                    if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                    if (newY >= 0 && board[newY][newX]) return false;
                }
            }
            return true;
        }

        function rotatePiece(piece) {
            const original = JSON.parse(JSON.stringify(piece.shape));
            piece.shape = piece.shape[0].map((_, i) =>
                piece.shape.map(row => row[i]).reverse()
            );
            if (!isValid(piece)) piece.shape = original;
        }

        function lockPiece(piece) {
            for (let y = 0; y < piece.shape.length; y++) {
                for (let x = 0; x < piece.shape[y].length; x++) {
                    if (!piece.shape[y][x]) continue;
                    const newX = piece.x + x;
                    const newY = piece.y + y;
                    if (newY >= 0) board[newY][newX] = piece.type;
                }
            }
        }

        function clearLines() {
            let cleared = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                if (board[y].every(cell => cell)) {
                    board.splice(y, 1);
                    board.unshift(Array(COLS).fill(null));
                    cleared++;
                    y++;
                }
            }
            if (cleared) {
                score += cleared * 100;
                lines += cleared;
                dropInterval = Math.max(100, 500 - (Math.floor(lines / 10) * 50));
            }
        }

        function update(deltaTime) {
            if (gameOver) return;

            dropCounter += deltaTime;
            if (dropCounter > dropInterval) {
                dropCounter = 0;
                currentPiece.y++;
                if (!isValid(currentPiece)) {
                    currentPiece.y--;
                    lockPiece(currentPiece);
                    clearLines();
                    currentPiece = nextPiece || createPiece();
                    nextPiece = createPiece();
                    if (!isValid(currentPiece)) {
                        gameOver = true;
                        gameOverMsg.innerHTML = '<div class="game-over">GAME OVER</div>';
                    }
                }
            }
        }

        function render() {
            gameBoard.innerHTML = '';

            for (let y = 0; y < ROWS; y++) {
                for (let x = 0; x < COLS; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (board[y][x]) {
                        cell.classList.add(board[y][x]);
                    }
                    gameBoard.appendChild(cell);
                }
            }

            if (currentPiece) {
                for (let y = 0; y < currentPiece.shape.length; y++) {
                    for (let x = 0; x < currentPiece.shape[y].length; x++) {
                        if (!currentPiece.shape[y][x]) continue;
                        const newX = currentPiece.x + x;
                        const newY = currentPiece.y + y;
                        if (newY >= 0 && newY < ROWS && newX >= 0 && newX < COLS) {
                            const idx = newY * COLS + newX;
                            gameBoard.children[idx].classList.add(currentPiece.type);
                        }
                    }
                }
            }

            scoreDisplay.textContent = score;
            levelDisplay.textContent = Math.floor(lines / 10) + 1;
            linesDisplay.textContent = lines;
        }

        function gameLoop(currentTime) {
            const deltaTime = lastTime ? currentTime - lastTime : 0;
            lastTime = currentTime;

            update(deltaTime);
            render();
            requestAnimationFrame(gameLoop);
        }

        document.addEventListener('keydown', (e) => {
            if (!currentPiece || gameOver) return;

            switch(e.key) {
                case 'ArrowLeft':
                    currentPiece.x--;
                    if (!isValid(currentPiece)) currentPiece.x++;
                    break;
                case 'ArrowRight':
                    currentPiece.x++;
                    if (!isValid(currentPiece)) currentPiece.x--;
                    break;
                case 'ArrowUp':
                    rotatePiece(currentPiece);
                    break;
                case 'ArrowDown':
                    currentPiece.y++;
                    if (!isValid(currentPiece)) currentPiece.y--;
                    else dropCounter = dropInterval;
                    break;
                case ' ':
                    e.preventDefault();
                    while (isValid(currentPiece)) currentPiece.y++;
                    currentPiece.y--;
                    dropCounter = dropInterval;
                    break;
            }
        });

        resetBtn.addEventListener('click', () => {
            board = Array(ROWS).fill(null).map(() => Array(COLS).fill(null));
            currentPiece = createPiece();
            nextPiece = createPiece();
            score = 0;
            lines = 0;
            gameOver = false;
            dropCounter = 0;
            dropInterval = 500;
            gameOverMsg.innerHTML = '';
            render();
        });

        currentPiece = createPiece();
        nextPiece = createPiece();
        requestAnimationFrame(gameLoop);
        render();
    </script>
</body>
</html>
